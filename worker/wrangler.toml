name = "bailuyuan-portfolio-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ─── D1 数据库 ───
[[d1_databases]]
binding = "DB"
database_name = "bailuyuan-portfolio"
database_id = "70477cb8-eb9b-4a7a-ad2e-7ee4683b0551"

# ─── R2 存储桶 ───
[[r2_buckets]]
binding = "R2"
bucket_name = "bailuyuan-images"

# ─── 环境变量 ───
[vars]
ADMIN_USER = "admin"
ADMIN_PASS = "admin123"
JWT_SECRET = "bailuyuan-admin-secret-2026"
