<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白鹿缘摄影 · 管理后台</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --border:#333;--border-light:#444;
  --text:#e0e0e0;--text-dim:#888;--text-muted:#555;
  --gold:#b8976a;--gold-light:#d4bc96;--gold-dark:#9a7d52;
  --red:#e74c3c;--red-dark:#c0392b;
  --green:#2ecc71;--green-dark:#27ae60;
  --blue:#3498db;--blue-dark:#2980b9;
  --radius:8px;--radius-lg:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --transition:all .25s ease;
}
body{font-family:'Inter','Noto Serif SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{width:32px;height:32px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.header h1{font-size:1rem;font-weight:500;letter-spacing:2px}
.header h1 span{color:var(--gold);font-weight:300;margin-left:8px;font-size:.85rem}
.header-actions{display:flex;gap:12px}

/* Buttons */
.btn{padding:10px 24px;border-radius:var(--radius);font-size:.8rem;font-weight:500;letter-spacing:1px;cursor:pointer;border:none;transition:var(--transition);display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--gold);color:#fff}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:var(--red-dark)}
.btn-sm{padding:6px 14px;font-size:.72rem}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:40px 24px}

/* Stats Bar */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:600;color:var(--gold);margin-bottom:4px}
.stat-card .label{font-size:.72rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}

/* Filter Bar */
.filter-bar{display:flex;gap:12px;margin-bottom:24px;align-items:center;flex-wrap:wrap}
.filter-bar select,.filter-bar input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:.82rem;outline:none;transition:var(--transition)}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--gold)}
.filter-bar input{flex:1;min-width:200px}

/* Grid */
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.work-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:var(--transition);position:relative}
.work-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:var(--shadow)}
.work-thumb{width:100%;height:200px;object-fit:cover;background:var(--surface2);display:block}
.work-thumb-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.8rem}
.work-body{padding:20px}
.work-body h3{font-size:.95rem;font-weight:500;margin-bottom:4px}
.work-body .cn{font-size:.8rem;color:var(--gold);margin-bottom:8px}
.work-body .meta{font-size:.72rem;color:var(--text-dim);margin-bottom:12px}
.work-body .category-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;background:rgba(184,151,106,.15);color:var(--gold);margin-bottom:12px}
.work-actions{display:flex;gap:8px;padding:0 20px 20px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1.1rem;font-weight:500}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:none;color:var(--text);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--red);color:#fff}
.modal-body{padding:24px 28px}

/* Form */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.75rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-size:.88rem;outline:none;transition:var(--transition);font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:80px}

/* Image Upload */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--gold);background:rgba(184,151,106,.05)}
.upload-zone.has-image{padding:0;border-style:solid}
.upload-zone img{width:100%;height:200px;object-fit:cover}
.upload-zone .upload-icon{font-size:2rem;margin-bottom:8px;color:var(--text-muted)}
.upload-zone .upload-text{font-size:.82rem;color:var(--text-dim)}
.upload-zone .upload-hint{font-size:.7rem;color:var(--text-muted);margin-top:4px}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone .change-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);color:#fff;font-size:.82rem}
.upload-zone:hover .change-overlay{opacity:1}

.modal-footer{padding:0 28px 24px;display:flex;gap:12px;justify-content:flex-end}

/* Toast */
.toast-container{position:fixed;top:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 24px;border-radius:var(--radius);font-size:.82rem;color:#fff;box-shadow:var(--shadow);animation:toastIn .3s ease;min-width:240px}
.toast.success{background:var(--green-dark)}
.toast.error{background:var(--red-dark)}
.toast.info{background:var(--blue-dark)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:none;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;max-width:400px}
.confirm-box h3{margin-bottom:12px;font-size:1rem}
.confirm-box p{color:var(--text-dim);font-size:.85rem;margin-bottom:24px}
.confirm-box .actions{display:flex;gap:12px;justify-content:center}

/* Empty State */
.empty{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty .icon{font-size:3rem;margin-bottom:16px}
.empty p{font-size:.9rem;margin-bottom:20px}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text-dim)}

/* Sort Handle */
.sort-handle{cursor:grab;color:var(--text-muted);font-size:1.2rem;padding:4px}
.sort-handle:active{cursor:grabbing}

/* Responsive */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .header{padding:16px 20px}
  .container{padding:24px 16px}
  .works-grid{grid-template-columns:1fr}
  .banner-grid{grid-template-columns:1fr}
}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:2px solid var(--border)}
.tab{padding:14px 32px;font-size:.8rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;position:relative;transition:var(--transition);border:none;background:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--gold)}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--surface3);font-size:.65rem;margin-left:8px;color:var(--text-dim)}
.tab.active .badge{background:rgba(184,151,106,.2);color:var(--gold)}

/* Tab Content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Banner Grid */
.banner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.banner-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:var(--transition)}
.banner-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.banner-thumb{width:100%;height:180px;object-fit:cover;background:var(--surface2);display:block}
.banner-thumb-placeholder{width:100%;height:180px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.8rem}
.banner-body{padding:20px}
.banner-body h3{font-size:.95rem;font-weight:500;margin-bottom:4px}
.banner-body .subtitle{font-size:.8rem;color:var(--gold);margin-bottom:8px}
.banner-body .meta{font-size:.72rem;color:var(--text-dim);margin-bottom:12px}
.banner-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-right:8px}
.banner-status.active{background:rgba(46,204,113,.15);color:var(--green)}
.banner-status.inactive{background:rgba(231,76,60,.15);color:var(--red)}
.banner-actions{display:flex;gap:8px;padding:0 20px 20px}

/* Toggle Switch */
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.toggle-label{font-size:.82rem;color:var(--text)}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:12px;transition:var(--transition)}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--text-dim);top:3px;left:3px;transition:var(--transition)}
.toggle input:checked+.toggle-slider{background:var(--gold)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);background:#fff}

/* Booking & Suggestion Cards */
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:12px;transition:var(--transition)}
.list-card:hover{border-color:var(--gold)}
.list-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.list-card-header h3{font-size:.95rem;font-weight:500}
.list-card-body{font-size:.85rem;color:var(--text-dim);line-height:1.7}
.list-card-body .field{margin-bottom:6px}
.list-card-body .field strong{color:var(--text);font-weight:500;min-width:70px;display:inline-block}
.list-card-body .message{margin-top:12px;padding:12px 16px;background:var(--bg);border-radius:var(--radius);font-size:.85rem;color:var(--text);line-height:1.8;white-space:pre-wrap}
.list-card-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.status-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.65rem;letter-spacing:1px;text-transform:uppercase}
.status-badge.pending{background:rgba(241,196,15,.15);color:#f1c40f}
.status-badge.confirmed{background:rgba(52,152,219,.15);color:#3498db}
.status-badge.done{background:rgba(46,204,113,.15);color:#2ecc71}
.status-badge.cancelled{background:rgba(231,76,60,.15);color:#e74c3c}
.status-badge.unread{background:rgba(241,196,15,.15);color:#f1c40f}
.status-badge.read{background:rgba(52,152,219,.15);color:#3498db}
.status-badge.replied{background:rgba(46,204,113,.15);color:#2ecc71}

/* Settings */
.settings-section{margin-bottom:32px}
.settings-title{font-size:.9rem;font-weight:500;margin-bottom:20px;color:var(--gold);letter-spacing:1px}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">B</div>
    <h1>白鹿缘摄影 <span>管理后台</span></h1>
  </div>
  <div class="header-actions" id="headerActions">
    <button class="btn btn-secondary" onclick="loadWorks()">🔄 刷新</button>
    <button class="btn btn-primary" onclick="openModal()">＋ 添加作品</button>
  </div>
</header>

<!-- Main -->
<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="works" onclick="switchTab('works')">
      📷 作品管理 <span class="badge" id="worksBadge">0</span>
    </div>
    <div class="tab" data-tab="banners" onclick="switchTab('banners')">
      🖼️ 轮播图 <span class="badge" id="bannersBadge">0</span>
    </div>
    <div class="tab" data-tab="bookings" onclick="switchTab('bookings')">
      📅 预约管理 <span class="badge" id="bookingsBadge">0</span>
    </div>
    <div class="tab" data-tab="suggestions" onclick="switchTab('suggestions')">
      💡 建议反馈 <span class="badge" id="suggestionsBadge">0</span>
    </div>
    <div class="tab" data-tab="settings" onclick="switchTab('settings')">
      ⚙️ 网站设置
    </div>
  </div>

  <!-- Tab: Works -->
  <div class="tab-content active" id="tabWorks">
    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Filter -->
    <div class="filter-bar">
      <select id="filterCategory" onchange="renderGrid()">
        <option value="all">全部分类</option>
        <option value="corporate">企业宣传</option>
        <option value="portrait">人像摄像</option>
        <option value="silver">银发团</option>
        <option value="headshot">肖像</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索作品名称..." oninput="renderGrid()">
    </div>

    <!-- Grid -->
    <div class="works-grid" id="worksGrid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- Tab: Banners -->
  <div class="tab-content" id="tabBanners">
    <div class="filter-bar">
      <button class="btn btn-primary" onclick="openBannerModal()">＋ 添加轮播图</button>
      <button class="btn btn-secondary" onclick="loadBanners()">🔄 刷新</button>
    </div>
    <div class="banner-grid" id="bannerGrid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- Tab: Bookings -->
  <div class="tab-content" id="tabBookings">
    <div class="filter-bar">
      <select id="bookingStatusFilter" onchange="renderBookings()">
        <option value="all">全部状态</option>
        <option value="pending">待处理</option>
        <option value="confirmed">已确认</option>
        <option value="done">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
      <button class="btn btn-secondary" onclick="loadBookings()">🔄 刷新</button>
    </div>
    <div id="bookingsList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- Tab: Suggestions -->
  <div class="tab-content" id="tabSuggestions">
    <div class="filter-bar">
      <select id="suggestionStatusFilter" onchange="renderSuggestions()">
        <option value="all">全部状态</option>
        <option value="unread">未读</option>
        <option value="read">已读</option>
        <option value="replied">已回复</option>
      </select>
      <button class="btn btn-secondary" onclick="loadSuggestions()">🔄 刷新</button>
    </div>
    <div id="suggestionsList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- Tab: Settings -->
  <div class="tab-content" id="tabSettings">
    <div class="settings-section">
      <h3 class="settings-title">💰 服务价格</h3>
      <div class="settings-grid">
        <div class="form-group">
          <label>企业宣传片（起）</label>
          <input type="text" id="setPriceCorporate" placeholder="12,800">
        </div>
        <div class="form-group">
          <label>人像摄像（起）</label>
          <input type="text" id="setPricePortrait" placeholder="2,680">
        </div>
        <div class="form-group">
          <label>银发团（起）</label>
          <input type="text" id="setPriceSilver" placeholder="1,980">
        </div>
        <div class="form-group">
          <label>肖像（起）</label>
          <input type="text" id="setPriceHeadshot" placeholder="880">
        </div>
      </div>
    </div>
    <div class="settings-section">
      <h3 class="settings-title">📞 联系方式</h3>
      <div class="settings-grid">
        <div class="form-group">
          <label>电话</label>
          <input type="text" id="setPhone" placeholder="400-920-8866">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="text" id="setEmail" placeholder="hello@bailuyuan.com">
        </div>
      </div>
    </div>
    <div class="settings-section">
      <h3 class="settings-title">📍 地址与营业时间</h3>
      <div class="form-group">
        <label>工作室地址</label>
        <input type="text" id="setAddress" placeholder="上海市黄浦区外滩金融中心<br>S2幢 36层">
      </div>
      <div class="form-group">
        <label>营业时间</label>
        <input type="text" id="setHours" placeholder="每日 09:00 - 20:00<br>全年无休（需提前预约）">
      </div>
    </div>
    <div style="margin-top:32px">
      <button class="btn btn-primary" id="btnSaveSettings" onclick="saveSettings()">💾 保存设置</button>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">添加作品</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>作品图片</label>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div id="uploadPlaceholder">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽上传图片</div>
            <div class="upload-hint">支持 JPG、PNG、WebP，建议尺寸 1200×800 以上</div>
          </div>
          <div id="uploadPreview" style="display:none">
            <img id="previewImg" src="" alt="">
            <div class="change-overlay">点击更换图片</div>
          </div>
          <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>
      </div>
      <div class="form-group">
        <label>英文名称</label>
        <input type="text" id="inputName" placeholder="Brand Rising">
      </div>
      <div class="form-group">
        <label>中文名称</label>
        <input type="text" id="inputCn" placeholder="品牌崛起">
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="inputCategory">
          <option value="corporate">企业宣传</option>
          <option value="portrait">人像摄像</option>
          <option value="silver">银发团</option>
          <option value="headshot">肖像</option>
        </select>
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="inputDetail" placeholder="企业形象 · 品牌宣传片"></textarea>
      </div>
      <div class="form-group">
        <label>排序（数字越小越靠前）</label>
        <input type="number" id="inputSort" value="0" min="0">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveWork()">保存</button>
    </div>
  </div>
</div>

<!-- Banner Add/Edit Modal -->
<div class="modal-overlay" id="bannerModalOverlay" onclick="handleBannerOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="bannerModalTitle">添加轮播图</h2>
      <button class="modal-close" onclick="closeBannerModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="bannerEditId">
      <div class="form-group">
        <label>轮播图片</label>
        <div class="upload-zone" id="bannerUploadZone" onclick="document.getElementById('bannerFileInput').click()">
          <div id="bannerUploadPlaceholder">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">点击或拖拽上传图片</div>
            <div class="upload-hint">建议尺寸 1920×800 以上，支持 JPG、PNG、WebP</div>
          </div>
          <div id="bannerUploadPreview" style="display:none">
            <img id="bannerPreviewImg" src="" alt="">
            <div class="change-overlay">点击更换图片</div>
          </div>
          <input type="file" id="bannerFileInput" accept="image/*" onchange="handleBannerFileSelect(event)">
        </div>
      </div>
      <div class="form-group">
        <label>标题（可选）</label>
        <input type="text" id="bannerTitle" placeholder="品牌视觉大片">
      </div>
      <div class="form-group">
        <label>副标题（可选）</label>
        <input type="text" id="bannerSubtitle" placeholder="专业 · 高端 · 定制">
      </div>
      <div class="form-group">
        <label>链接（可选）</label>
        <input type="text" id="bannerLink" placeholder="点击跳转的 URL，留空不跳转">
      </div>
      <div class="form-group">
        <label>排序（数字越小越靠前）</label>
        <input type="number" id="bannerSort" value="0" min="0">
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="bannerActive" checked>
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">启用此轮播图（前台可见）</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBannerModal()">取消</button>
      <button class="btn btn-primary" id="bannerBtnSave" onclick="saveBanner()">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>确认删除</h3>
    <p id="confirmText">确定要删除这个作品吗？此操作不可撤销。</p>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirmBtn">删除</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════
// ⚠️  部署后请修改此地址为你的 Worker 地址
// ══════════════════════════════════════════════
const API_BASE = 'https://api.bailuyuan.fun';

let works = [];
let banners = [];
let bookings = [];
let suggestions = [];
let selectedFile = null;
let selectedFileUrl = '';
let bannerSelectedFile = null;
let bannerSelectedFileUrl = '';

// ═══ Tab Switching ═══
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1)));
  const actions = document.getElementById('headerActions');
  const tabActions = {
    works: `<button class="btn btn-secondary" onclick="loadWorks()">🔄 刷新</button><button class="btn btn-primary" onclick="openModal()">＋ 添加作品</button>`,
    banners: `<button class="btn btn-secondary" onclick="loadBanners()">🔄 刷新</button><button class="btn btn-primary" onclick="openBannerModal()">＋ 添加轮播图</button>`,
    bookings: `<button class="btn btn-secondary" onclick="loadBookings()">🔄 刷新</button>`,
    suggestions: `<button class="btn btn-secondary" onclick="loadSuggestions()">🔄 刷新</button>`,
    settings: ``
  };
  actions.innerHTML = tabActions[tab] || '';
}

// ─── API ───
async function api(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, options);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Request failed' }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

// ─── Load Works ───
async function loadWorks() {
  try {
    works = await api('/api/works');
    document.getElementById('worksBadge').textContent = works.length;
    renderStats();
    renderGrid();
  } catch (e) {
    toast('加载失败: ' + e.message, 'error');
  }
}

// ─── Render Stats ───
function renderStats() {
  const total = works.length;
  const cats = {};
  works.forEach(w => { cats[w.category] = (cats[w.category] || 0) + 1; });
  const catLabels = { corporate: '企业宣传', portrait: '人像摄像', silver: '银发团', headshot: '肖像' };

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">总作品数</div></div>
    <div class="stat-card"><div class="num">${cats.corporate || 0}</div><div class="label">企业宣传</div></div>
    <div class="stat-card"><div class="num">${cats.portrait || 0}</div><div class="label">人像摄像</div></div>
    <div class="stat-card"><div class="num">${(cats.silver || 0) + (cats.headshot || 0)}</div><div class="label">银发 + 肖像</div></div>
  `;
}

// ─── Render Grid ───
function renderGrid() {
  const cat = document.getElementById('filterCategory').value;
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = works;
  if (cat !== 'all') filtered = filtered.filter(w => w.category === cat);
  if (q) filtered = filtered.filter(w =>
    w.name.toLowerCase().includes(q) || w.cn.includes(q) || w.detail.toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    document.getElementById('worksGrid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="icon">📷</div>
        <p>${works.length === 0 ? '还没有作品，点击上方「添加作品」开始吧' : '没有匹配的作品'}</p>
        ${works.length === 0 ? '<button class="btn btn-primary" onclick="openModal()">＋ 添加第一个作品</button>' : ''}
      </div>`;
    return;
  }

  const catLabels = { corporate: '企业宣传', portrait: '人像摄像', silver: '银发团', headshot: '肖像' };

  document.getElementById('worksGrid').innerHTML = filtered.map(w => `
    <div class="work-card" data-id="${w.id}">
      ${w.image_key
        ? `<img class="work-thumb" src="${API_BASE}/api/image/${encodeURIComponent(w.image_key)}" alt="${w.name}" loading="lazy" onerror="this.outerHTML='<div class=work-thumb-placeholder>图片加载失败</div>'">`
        : `<div class="work-thumb-placeholder">暂无图片</div>`
      }
      <div class="work-body">
        <div class="category-badge">${catLabels[w.category] || w.category}</div>
        <h3>${esc(w.name)}</h3>
        <div class="cn">${esc(w.cn)}</div>
        <div class="meta">${esc(w.detail)} · 排序: ${w.sort_order}</div>
      </div>
      <div class="work-actions">
        <button class="btn btn-secondary btn-sm" onclick="editWork('${w.id}')">✏️ 编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteWork('${w.id}','${esc(w.name)}')">🗑️ 删除</button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ─── Modal ───
function openModal(work = null) {
  document.getElementById('editId').value = work ? work.id : '';
  document.getElementById('modalTitle').textContent = work ? '编辑作品' : '添加作品';
  document.getElementById('inputName').value = work ? work.name : '';
  document.getElementById('inputCn').value = work ? work.cn : '';
  document.getElementById('inputCategory').value = work ? work.category : 'corporate';
  document.getElementById('inputDetail').value = work ? work.detail : '';
  document.getElementById('inputSort').value = work ? work.sort_order : works.length;

  // Reset upload
  selectedFile = null;
  selectedFileUrl = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadPlaceholder').style.display = '';
  document.getElementById('uploadPreview').style.display = 'none';

  // If editing and has image, show current
  if (work && work.image_key) {
    selectedFileUrl = `${API_BASE}/api/image/${encodeURIComponent(work.image_key)}`;
    document.getElementById('previewImg').src = selectedFileUrl;
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('uploadPreview').style.display = '';
  }

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ─── File Upload ───
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  selectedFileUrl = URL.createObjectURL(file);
  document.getElementById('previewImg').src = selectedFileUrl;
  document.getElementById('uploadPlaceholder').style.display = 'none';
  document.getElementById('uploadPreview').style.display = '';
}

// ─── Save ───
async function saveWork() {
  const id = document.getElementById('editId').value;
  const isNew = !id;
  const fd = new FormData();
  fd.append('name', document.getElementById('inputName').value);
  fd.append('cn', document.getElementById('inputCn').value);
  fd.append('category', document.getElementById('inputCategory').value);
  fd.append('detail', document.getElementById('inputDetail').value);
  fd.append('sort_order', document.getElementById('inputSort').value);
  if (selectedFile) fd.append('image', selectedFile);

  if (isNew && !selectedFile) {
    toast('请上传一张图片', 'error');
    return;
  }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    if (isNew) {
      await api('/api/works', { method: 'POST', body: fd });
      toast('作品已添加', 'success');
    } else {
      await api(`/api/works/${id}`, { method: 'PUT', body: fd });
      toast('作品已更新', 'success');
    }
    closeModal();
    await loadWorks();
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

// ─── Edit ───
function editWork(id) {
  const work = works.find(w => w.id === id);
  if (work) openModal(work);
}

// ─── Delete ───
function deleteWork(id, name) {
  document.getElementById('confirmText').textContent = `确定要删除「${name}」吗？图片也将被永久删除。`;
  document.getElementById('confirmOverlay').classList.add('active');
  document.getElementById('confirmBtn').onclick = async () => {
    closeConfirm();
    try {
      await api(`/api/works/${id}`, { method: 'DELETE' });
      toast('已删除', 'success');
      await loadWorks();
    } catch (e) {
      toast('删除失败: ' + e.message, 'error');
    }
  };
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
}

// ─── Toast ───
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════
// ═══ Banner CRUD ═══
// ═══════════════════════════════════════════════

// ─── Load Banners ───
async function loadBanners() {
  try {
    banners = await api('/api/banners');
    document.getElementById('bannersBadge').textContent = banners.length;
    renderBannerGrid();
  } catch (e) {
    toast('加载轮播图失败: ' + e.message, 'error');
  }
}

// ─── Render Banner Grid ───
function renderBannerGrid() {
  const grid = document.getElementById('bannerGrid');
  if (banners.length === 0) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="icon">🖼️</div>
        <p>还没有轮播图，点击上方「添加轮播图」开始吧</p>
        <button class="btn btn-primary" onclick="openBannerModal()">＋ 添加第一张轮播图</button>
      </div>`;
    return;
  }

  grid.innerHTML = banners.map(b => {
    const statusClass = b.active ? 'active' : 'inactive';
    const statusText = b.active ? '已启用' : '已禁用';
    return `
    <div class="banner-card" data-id="${b.id}">
      ${b.image_key
        ? `<img class="banner-thumb" src="${API_BASE}/api/image/${encodeURIComponent(b.image_key)}" alt="${b.title}" loading="lazy" onerror="this.outerHTML='<div class=banner-thumb-placeholder>图片加载失败</div>'">`
        : `<div class="banner-thumb-placeholder">暂无图片</div>`
      }
      <div class="banner-body">
        <span class="banner-status ${statusClass}">${statusText}</span>
        <span class="banner-status" style="background:rgba(255,255,255,.05);color:var(--text-dim)">排序: ${b.sort_order}</span>
        <h3 style="margin-top:12px">${esc(b.title || '(无标题)')}</h3>
        <div class="subtitle">${esc(b.subtitle)}</div>
        ${b.link ? `<div class="meta">🔗 ${esc(b.link)}</div>` : ''}
      </div>
      <div class="banner-actions">
        <button class="btn btn-secondary btn-sm" onclick="editBanner('${b.id}')">✏️ 编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBanner('${b.id}','${esc(b.title)}')">🗑️ 删除</button>
      </div>
    </div>`;
  }).join('');
}

// ─── Banner Modal ───
function openBannerModal(banner = null) {
  document.getElementById('bannerEditId').value = banner ? banner.id : '';
  document.getElementById('bannerModalTitle').textContent = banner ? '编辑轮播图' : '添加轮播图';
  document.getElementById('bannerTitle').value = banner ? banner.title : '';
  document.getElementById('bannerSubtitle').value = banner ? banner.subtitle : '';
  document.getElementById('bannerLink').value = banner ? banner.link : '';
  document.getElementById('bannerSort').value = banner ? banner.sort_order : banners.length;
  document.getElementById('bannerActive').checked = banner ? !!banner.active : true;

  bannerSelectedFile = null;
  bannerSelectedFileUrl = '';
  document.getElementById('bannerFileInput').value = '';
  document.getElementById('bannerUploadPlaceholder').style.display = '';
  document.getElementById('bannerUploadPreview').style.display = 'none';

  if (banner && banner.image_key) {
    bannerSelectedFileUrl = `${API_BASE}/api/image/${encodeURIComponent(banner.image_key)}`;
    document.getElementById('bannerPreviewImg').src = bannerSelectedFileUrl;
    document.getElementById('bannerUploadPlaceholder').style.display = 'none';
    document.getElementById('bannerUploadPreview').style.display = '';
  }

  document.getElementById('bannerModalOverlay').classList.add('active');
}

function closeBannerModal() {
  document.getElementById('bannerModalOverlay').classList.remove('active');
}

function handleBannerOverlayClick(e) {
  if (e.target === e.currentTarget) closeBannerModal();
}

// ─── Banner File Upload ───
function handleBannerFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  bannerSelectedFile = file;
  bannerSelectedFileUrl = URL.createObjectURL(file);
  document.getElementById('bannerPreviewImg').src = bannerSelectedFileUrl;
  document.getElementById('bannerUploadPlaceholder').style.display = 'none';
  document.getElementById('bannerUploadPreview').style.display = '';
}

// ─── Save Banner ───
async function saveBanner() {
  const id = document.getElementById('bannerEditId').value;
  const isNew = !id;
  const fd = new FormData();
  fd.append('title', document.getElementById('bannerTitle').value);
  fd.append('subtitle', document.getElementById('bannerSubtitle').value);
  fd.append('link', document.getElementById('bannerLink').value);
  fd.append('sort_order', document.getElementById('bannerSort').value);
  fd.append('active', document.getElementById('bannerActive').checked ? '1' : '0');
  if (bannerSelectedFile) fd.append('image', bannerSelectedFile);

  if (isNew && !bannerSelectedFile) {
    toast('请上传一张图片', 'error');
    return;
  }

  const btn = document.getElementById('bannerBtnSave');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    if (isNew) {
      await api('/api/banners', { method: 'POST', body: fd });
      toast('轮播图已添加', 'success');
    } else {
      await api(`/api/banners/${id}`, { method: 'PUT', body: fd });
      toast('轮播图已更新', 'success');
    }
    closeBannerModal();
    await loadBanners();
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

// ─── Edit Banner ───
function editBanner(id) {
  const banner = banners.find(b => b.id === id);
  if (banner) openBannerModal(banner);
}

// ─── Delete Banner ───
function deleteBanner(id, name) {
  document.getElementById('confirmText').textContent = `确定要删除轮播图「${name || '无标题'}」吗？图片也将被永久删除。`;
  document.getElementById('confirmOverlay').classList.add('active');
  document.getElementById('confirmBtn').onclick = async () => {
    closeConfirm();
    try {
      await api(`/api/banners/${id}`, { method: 'DELETE' });
      toast('已删除', 'success');
      await loadBanners();
    } catch (e) {
      toast('删除失败: ' + e.message, 'error');
    }
  };
}

// ─── Init ───
loadWorks();
loadBanners();
loadBookings();
loadSuggestions();
loadSettings();

// ═══════════════════════════════════════════════
// ═══ Settings ═══
// ═══════════════════════════════════════════════

async function loadSettings() {
  try {
    const s = await api('/api/settings');
    document.getElementById('setPriceCorporate').value = s.price_corporate || '';
    document.getElementById('setPricePortrait').value = s.price_portrait || '';
    document.getElementById('setPriceSilver').value = s.price_silver || '';
    document.getElementById('setPriceHeadshot').value = s.price_headshot || '';
    document.getElementById('setPhone').value = s.phone || '';
    document.getElementById('setEmail').value = s.email || '';
    document.getElementById('setAddress').value = s.address || '';
    document.getElementById('setHours').value = s.hours || '';
  } catch (e) {
    toast('加载设置失败: ' + e.message, 'error');
  }
}

async function saveSettings() {
  const btn = document.getElementById('btnSaveSettings');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    await api('/api/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        price_corporate: document.getElementById('setPriceCorporate').value,
        price_portrait: document.getElementById('setPricePortrait').value,
        price_silver: document.getElementById('setPriceSilver').value,
        price_headshot: document.getElementById('setPriceHeadshot').value,
        phone: document.getElementById('setPhone').value,
        email: document.getElementById('setEmail').value,
        address: document.getElementById('setAddress').value,
        hours: document.getElementById('setHours').value,
      })
    });
    toast('设置已保存，刷新前台页面后生效', 'success');
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 保存设置';
  }
}

// ═══════════════════════════════════════════════
// ═══ Bookings CRUD ═══
// ═══════════════════════════════════════════════

async function loadBookings() {
  try {
    bookings = await api('/api/bookings');
    document.getElementById('bookingsBadge').textContent = bookings.length;
    renderBookings();
  } catch (e) {
    toast('加载预约失败: ' + e.message, 'error');
  }
}

function renderBookings() {
  const status = document.getElementById('bookingStatusFilter').value;
  let filtered = bookings;
  if (status !== 'all') filtered = filtered.filter(b => b.status === status);

  const list = document.getElementById('bookingsList');
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">📅</div>
        <p>${bookings.length === 0 ? '暂无预约记录' : '没有匹配的预约'}</p>
      </div>`;
    return;
  }

  const statusLabels = { pending: '待处理', confirmed: '已确认', done: '已完成', cancelled: '已取消' };
  const typeLabels = { '企业宣传片': '🎬 企业宣传片', '人像摄像': '🎥 人像摄像', '银发团': '👴 银发团', '肖像': '📸 肖像' };

  list.innerHTML = filtered.map(b => `
    <div class="list-card" data-id="${b.id}">
      <div class="list-card-header">
        <h3>${esc(b.name)}</h3>
        <span class="status-badge ${b.status}">${statusLabels[b.status] || b.status}</span>
      </div>
      <div class="list-card-body">
        <div class="field"><strong>电话：</strong>${esc(b.phone)}</div>
        <div class="field"><strong>类型：</strong>${typeLabels[b.type] || esc(b.type)}</div>
        ${b.date ? `<div class="field"><strong>日期：</strong>${esc(b.date)}</div>` : ''}
        <div class="field"><strong>时间：</strong>${b.created_at}</div>
        ${b.message ? `<div class="message">${esc(b.message)}</div>` : ''}
      </div>
      <div class="list-card-actions">
        ${b.status === 'pending' ? `
          <button class="btn btn-primary btn-sm" onclick="updateBooking('${b.id}','confirmed')">✅ 确认</button>
          <button class="btn btn-danger btn-sm" onclick="updateBooking('${b.id}','cancelled')">❌ 取消</button>
        ` : ''}
        ${b.status === 'confirmed' ? `
          <button class="btn btn-primary btn-sm" onclick="updateBooking('${b.id}','done')">✅ 完成</button>
        ` : ''}
        <button class="btn btn-secondary btn-sm" onclick="deleteBooking('${b.id}','${esc(b.name)}')">🗑️ 删除</button>
      </div>
    </div>
  `).join('');
}

async function updateBooking(id, status) {
  try {
    await api(`/api/bookings/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    toast('状态已更新', 'success');
    await loadBookings();
  } catch (e) {
    toast('更新失败: ' + e.message, 'error');
  }
}

function deleteBooking(id, name) {
  document.getElementById('confirmText').textContent = `确定要删除「${name}」的预约记录吗？`;
  document.getElementById('confirmOverlay').classList.add('active');
  document.getElementById('confirmBtn').onclick = async () => {
    closeConfirm();
    try {
      await api(`/api/bookings/${id}`, { method: 'DELETE' });
      toast('已删除', 'success');
      await loadBookings();
    } catch (e) {
      toast('删除失败: ' + e.message, 'error');
    }
  };
}

// ═══════════════════════════════════════════════
// ═══ Suggestions CRUD ═══
// ═══════════════════════════════════════════════

async function loadSuggestions() {
  try {
    suggestions = await api('/api/suggestions');
    document.getElementById('suggestionsBadge').textContent = suggestions.length;
    renderSuggestions();
  } catch (e) {
    toast('加载建议失败: ' + e.message, 'error');
  }
}

function renderSuggestions() {
  const status = document.getElementById('suggestionStatusFilter').value;
  let filtered = suggestions;
  if (status !== 'all') filtered = filtered.filter(s => s.status === status);

  const list = document.getElementById('suggestionsList');
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">💡</div>
        <p>${suggestions.length === 0 ? '暂无建议反馈' : '没有匹配的建议'}</p>
      </div>`;
    return;
  }

  const statusLabels = { unread: '未读', read: '已读', replied: '已回复' };

  list.innerHTML = filtered.map(s => `
    <div class="list-card" data-id="${s.id}">
      <div class="list-card-header">
        <h3>${s.contact ? esc(s.contact) : '匿名用户'}</h3>
        <span class="status-badge ${s.status}">${statusLabels[s.status] || s.status}</span>
      </div>
      <div class="list-card-body">
        <div class="message">${esc(s.content)}</div>
        <div class="field" style="margin-top:10px"><strong>时间：</strong>${s.created_at}</div>
      </div>
      <div class="list-card-actions">
        ${s.status === 'unread' ? `
          <button class="btn btn-primary btn-sm" onclick="updateSuggestion('${s.id}','read')">👁️ 标为已读</button>
        ` : ''}
        ${s.status !== 'replied' ? `
          <button class="btn btn-primary btn-sm" onclick="updateSuggestion('${s.id}','replied')">💬 已回复</button>
        ` : ''}
        <button class="btn btn-secondary btn-sm" onclick="deleteSuggestion('${s.id}')">🗑️ 删除</button>
      </div>
    </div>
  `).join('');
}

async function updateSuggestion(id, status) {
  try {
    await api(`/api/suggestions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    toast('状态已更新', 'success');
    await loadSuggestions();
  } catch (e) {
    toast('更新失败: ' + e.message, 'error');
  }
}

function deleteSuggestion(id) {
  document.getElementById('confirmText').textContent = '确定要删除这条建议吗？';
  document.getElementById('confirmOverlay').classList.add('active');
  document.getElementById('confirmBtn').onclick = async () => {
    closeConfirm();
    try {
      await api(`/api/suggestions/${id}`, { method: 'DELETE' });
      toast('已删除', 'success');
      await loadSuggestions();
    } catch (e) {
      toast('删除失败: ' + e.message, 'error');
    }
  };
}
</script>
